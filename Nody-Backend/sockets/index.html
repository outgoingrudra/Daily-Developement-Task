<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Test</title>
</head>
<body>
    <h1>Socket.io</h1>

    <!-- Fixed: correct Socket.io client library -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Removed type="module" and fixed typos -->
    <script>
        const socket = io();
        
        socket.on("connect", () => {
            console.log("Connected to server");
            
            setTimeout(() => {
                socket.disconnect();  // Fixed typo
            }, 5000);
        });

        socket.on("disconnect", () => {
            console.log("Disconnected from server");
        });
    </script>
</body>
</html>
