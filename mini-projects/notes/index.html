<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .upper {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
  </style>
  <body>
    <div class="upper">
      <div>
        <h3>Note-APP</h3>
        <div>
          <legend>ADD NOTE</legend>
          <label for="">Title</label>
          <input type="text" id="title" /><br /><br />
          <label for="">Content</label>
          <textarea name="" id="content"></textarea>
         <div id="formbtn"> <button id="btn" onclick="adder()">ADD</button></div>
        </div>
      </div>
    </div>
   <center> <p style="color: red;" id="warn"></p></center>
    <hr />

    <div id="show"></div>
    <script>
      let notes = [
        {
          title: "Java",
          description: "dummy-1212",
          star : false ,
        },
        {
          title: "Python",
          description: "dummy-222222222212",
           star : false ,
        },
      ];

      function populate() {
        let area = document.getElementById("show");
        area.innerHTML = "";
        for (let i = 0; i < notes.length; i++) {
          area.innerHTML += `<div>
            <h3 style="color: green;font-size: x-large;">${notes[i].title}</h3>
            <p>${notes[i].description}</p>
            <button onclick='del(${i})' class='del-btn' style="background-color: red; font-size: large;">Delete</button>
            <button onclick='edit(${i})' class='del-btn' style="background-color: green; font-size: large;">Edit</button>
            <button  onclick='star(${i})' class='del-btn' style="background-color: orange; font-size: large;">${notes[i].star ? "UnStar": "Star"}</button>
        </div>
        <hr>`;
        }
      }

      populate();

      function adder() {
        let x = document.getElementById("title").value;
        let y = document.getElementById("content").value;

        if(x=="" || y=="") {
          document.getElementById("warn").innerHTML = "Enter Title and Description"
          return 
        }

        notes.push({ title: x, description: y , star : false });
        populate();
        document.getElementById("title").value="";
        document.getElementById("content").value="";
      }

      function del(x) {
        temp = [];
        let j = 0;
        for (let i = 0; i < notes.length; i++) {
          if (i != x) {
            temp[j++] = notes[i];
          }
        }
        notes = temp;
        populate();
      }

      function edit(i){
        document.getElementById("title").value = notes[i].title
        document.getElementById("content").value = notes[i].description

        document.getElementById('formbtn').innerHTML= `<button onclick="update(${i})">Edit</button>`
       
      }

      function update(i){
        notes[i].title = document.getElementById("title").value
        notes[i].description = document.getElementById("content").value

        document.getElementById('formbtn').innerHTML=` <button id="btn" onclick="adder()">ADD</button>`

        populate()
        document.getElementById("title").value="";
        document.getElementById("content").value="";


      }
   
     function star(i){
         notes[i].star = !notes[i].star
         populate()
     }
   </script>
  </body>
</html>
