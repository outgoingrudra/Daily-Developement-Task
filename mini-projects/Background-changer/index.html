<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 97vh;
    }
    button{
        height: 100px ;
        width: 300px;
        background-color: black;
        color: white;
        font-size: xx-large;
        border-radius: 20px;
        cursor: pointer;

    }
</style>
<body>

    <button id="btn" onclick="Updater()"> Change Background </button>
    
</body>

<script>
    
     let x = 0

    function Updater(){
        colors = ["blue","green","yellow","orange","pink","red"]
        if(x==colors.length) x=0
        document.body.style.backgroundColor = colors[x++]
        
    }
    
</script>
</html>
