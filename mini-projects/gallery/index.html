<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body{
        background:#111;
        color:white;
        padding:40px;
    }

    h1{
        text-align:center;
        margin-bottom:30px;
        letter-spacing:2px;
    }

    .gallery{
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
        gap:20px;
    }

    .gallery img{
        width:100%;
        height:250px;
        object-fit:cover;
        border-radius:10px;
        transition:0.4s ease;
        cursor:pointer;
    }

    .gallery img:hover{
        transform:scale(1.05);
        box-shadow:0 10px 20px rgba(255,255,255,0.2);
    }
</style>
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/400/300?random=1">
    <img src="https://picsum.photos/400/300?random=2">
    <img src="https://picsum.photos/400/300?random=3">
    <img src="https://picsum.photos/400/300?random=4">
    <img src="https://picsum.photos/400/300?random=5">
    <img src="https://picsum.photos/400/300?random=6">
    <img src="https://picsum.photos/400/300?random=7">
    <img src="https://picsum.photos/400/300?random=8">
</div>

</body>
</html>
