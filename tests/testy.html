<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    .box{
        height: 70px;
        width: 70px;
        background-color: gray;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: larger;
    }
    #container{
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }
</style>
<body>
    <div id="container">
    </div>

</body>
<script>
    let box =  document.getElementById("container")
   
    let last = null
    let curr = null
    let it = null

    function execute(){
        box.innerHTML=""
         for(let i = 1 ; i < 10 ;i++){
        box.innerHTML += `<div class="box" onclick="check(this)">${i}</div>`
        
    }

        it=  setInterval(() => {
        idx = Math.floor(Math.random()*9)
       last ?  last.style.backgroundColor= "gray" : ""
        curr = document.getElementsByClassName("box")[idx]
        curr.style.backgroundColor = "Green"
        last = curr


    }, 800);
    }

    execute()
   

  

    function check(element){
    if(element == curr){
        clearInterval(it)
        box.innerHTML = `<h1> Hurray ! You Won !!!</h1> <button onclick ="execute()"> Play Again</button>`
    }
}

  
</script>
</html>
