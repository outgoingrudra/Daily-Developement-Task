<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn" onclick="action()">Hide</button><br><br>
    <img id="image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJo7n7XXByw40QwFnGILGMq2BxD55PkKl8yA&s" alt="">

    <script>
        function action(){
             let img = document.getElementById("image")
             let btn = document.getElementById("btn")
             
             if(img.style.visibility =="hidden"){
                  img.style.visibility = "visible"
             }
             else {
                img.style.visibility ="hidden"
             }


             if(btn.textContent =="Hide") btn.textContent = "Show"
             else btn.textContent = "Hide"
        }

    </script>
</body>
</html>
