<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #box{
        height: 150px;
        width: 150px;
        background-color: blue;
        position: absolute;
        margin: 30px;
        
     
    }

</style>
<body>
    <button onclick="move()">Move</button> <br> <br>
    <div id="box"></div>
    
</body>
<script>
    let box = document.getElementById("box")

    function move(){
        let angle =0
         interval = setInterval(() => {
          box.style.transform = "rotateZ("+angle+"deg)"
          angle += 10
           

            if(angle==200){
                clearInterval(interval)
            }
        }, 100);
    }

</script>
</html>
