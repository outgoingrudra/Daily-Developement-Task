<!DOCTYPE html>
<html>
<head>
  <title>Smooth Animation</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    #box {
      height: 150px;
      width: 150px;
      background: linear-gradient(45deg, blue, cyan);
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 0%;
      transition: background 0.3s;
    }
  </style>
</head>
<body>

<button onclick="move()">Move</button>
<div id="box"></div>

<script>
  const box = document.getElementById("box");

  let x = 0;
  let y = 0;
  let radius = 0;
  let angle = 0;
  let speed = 3;
  let direction = 1;
  let animationFrame;

  function animate() {
    x += speed * direction;
    y += speed * direction;
    angle += 2;

    if (radius < 50) radius += 0.5;

    box.style.transform = `
      translate(${x}px, ${y}px)
      rotate(${angle}deg)
    `;
    box.style.borderRadius = radius + "%";

    // Bounce back
    if (x > 500 || x < 0) {
      direction *= -1;
      box.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
    }

    animationFrame = requestAnimationFrame(animate);
  }

  function move() {
    cancelAnimationFrame(animationFrame);
    x = 0;
    y = 0;
    radius = 0;
    direction = 1;
    animate();
  }
</script>

</body>
</html>
